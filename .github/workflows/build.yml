name: Build MicroPython + ulab (NUCLEO-F446RE)

on:
  push:
    branches: [ master, main ]
  workflow_dispatch: # Permet de lancer la compilation manuellement

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install Toolchain ARM & Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi build-essential libnewlib-arm-none-eabi python3

      - name: Clone MicroPython
        run: |
          git clone https://github.com/micropython/micropython.git
          cd micropython
          git submodule update --init lib/pico lib/cmsis lib/stm32lib

      - name: Clone ulab
        run: |
          git clone https://github.com/v923z/ulab.git

      - name: Build mpy-cross (MicroPython Compiler)
        run: |
          make -C micropython/mpy-cross

      - name: Build NUCLEO_F446RE Firmware
        run: |
          # On se place dans le dossier du port STM32
          cd micropython/ports/stm32
          
          # Compilation avec l'option USER_C_MODULES pointant vers ulab
          # On utilise l'argument absolute path pour éviter les erreurs
          make BOARD=NUCLEO_F446RE USER_C_MODULES=../../../ulab/code/micropython.cmake
          
      - name: Prepare Artifacts
        run: |
          mkdir -p build_output
          cp micropython/ports/stm32/build-NUCLEO_F446RE/firmware.bin build_output/micropython-nucleo-f446re-ulab.bin
          cp micropython/ports/stm32/build-NUCLEO_F446RE/firmware.hex build_output/micropython-nucleo-f446re-ulab.hex

      - name: Upload Firmware
        uses: actions/upload-artifact@v3
        with:
          name: MicroPython-ulab-NUCLEO_F446RE
          path: build_output/
